name: Build & Release App

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  android-release:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm ci

      - name: Set Version
        id: version
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="1.0.${{ github.run_number }}"
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "🔖 Building version: $VERSION_NAME (code: $VERSION_CODE)"

      - name: Decode Android Keystore
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.ANDROID_RELEASE_KEYSTORE }}" | base64 --decode > android/app/my-upload-key.keystore

      - name: Build Release APK
        if: github.event_name != 'pull_request'
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PVERSION_CODE=${{ steps.version.outputs.VERSION_CODE }} \
            -PVERSION_NAME=${{ steps.version.outputs.VERSION_NAME }}

      - name: Build Debug APK for PR validation
        if: github.event_name == 'pull_request'
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename APK with version
        if: github.event_name != 'pull_request'
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/QuickBite-v${{ steps.version.outputs.VERSION_NAME }}.apk

      - name: Create GitHub Release & Upload APK
        id: create_release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION_NAME }}
          name: QuickBite v${{ steps.version.outputs.VERSION_NAME }}
          body: |
            ## 🚀 QuickBite v${{ steps.version.outputs.VERSION_NAME }}

            Auto-release built from commit `${{ github.sha }}` on branch `${{ github.ref_name }}`.

            ### 📦 Install
            Download the APK below and install it on your Android device.
            > Enable **"Install from unknown sources"** in Settings if prompted.
          files: android/app/build/outputs/apk/release/QuickBite-v${{ steps.version.outputs.VERSION_NAME }}.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Output Release URL
        if: github.event_name == 'push'
        run: echo "🚀 APK Release URL -> ${{ steps.create_release.outputs.url }}"
